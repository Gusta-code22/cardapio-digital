spring:
  application:
    name: cardapio-escolar

  # Mantive suas credenciais de admin aqui, mas se quiser protegê-las depois,
  # pode usar o mesmo esquema de chaves (ex: ${ADMIN_PASSWORD:cadastro123})
  profiles:
    active: local
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}

  datasource:
    url: ${SUPABASE_URL}
    username: ${SUPABASE_USER}
    password: ${SUPABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # Desativado para não poluir os logs do Render em produção
    properties:
      hibernate:
        format_sql: true

# Configuração da porta dinâmica que o Render exige para o Dock
server:
  port: ${PORT:8080}