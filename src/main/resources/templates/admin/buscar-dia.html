<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Buscar Cardápio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow border-0 p-4" style="max-width: 450px; width: 100%;">

        <div class="card-body">
            <h3 class="card-title text-center mb-3 text-primary fw-bold">Editar por Data</h3>
            <p class="text-muted text-center small mb-4">Selecione a data do cardápio que você deseja atualizar no sistema.</p>

            <div th:if="${mensagemErro}" class="alert alert-danger alert-dismissible fade show small" role="alert">
                <span th:text="${mensagemErro}">Erro</span>
            </div>

            <form th:action="@{/admin/dia/processar-busca}" method="POST">
                <div class="mb-4">
                    <label for="dataBusca" class="form-label fw-semibold text-secondary">Data do Cardápio</label>
                    <input type="date" id="dataBusca" name="dataBusca" class="form-control form-control-lg text-center" required />
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">Buscar e Editar</button>
                    <a th:href="@{/admin/semana/novo}" class="btn btn-link text-decoration-none text-muted btn-sm">Voltar ao cadastro</a>
                </div>
            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
